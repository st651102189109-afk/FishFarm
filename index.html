<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบโรงเรือนเลี้ยงปลาอัจฉริยะ</title>
    
    <link rel="icon" type="image/png" href="fish-icon.png">
    <link rel="apple-touch-icon" href="fish-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap');
        :root { 
            --primary: #0277bd; /* Deep Water Blue */
            --secondary: #00acc1; /* Cyan Blue */
            --bg: #f0f9ff; 
            --red: #f44336; 
            --green: #4caf50; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Kanit', sans-serif; margin: 0; background: var(--bg); padding-bottom: 80px; }
        
        header { background: var(--primary); color: white; padding: 15px 20px; border-radius: 0 0 25px 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        header h3 { margin: 0; font-size: 1.2rem; display: flex; align-items: center; gap: 8px; }

        .container { max-width: 600px; margin: 0 auto; padding: 10px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Sensor Grid 4 Columns */
        .sensor-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 15px; }
        .sensor-card { background: white; padding: 8px 4px; border-radius: 12px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
        .sensor-card i { font-size: 0.9rem; margin-bottom: 2px; }
        .sensor-card .val { font-size: 0.85rem; font-weight: 600; display: block; }
        .sensor-card small { color: #64748b; font-size: 0.65rem; display: block; }

        .panel { background: white; border-radius: 20px; padding: 15px; margin-bottom: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 5px solid var(--primary); }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f1f5f9; }

        /* Input Controls */
        .input-group { display: flex; align-items: center; background: #f8fafc; padding: 6px 10px; border-radius: 10px; border: 1px solid #e2e8f0; }
        input[type="time"] { border: none; background: transparent; font-family: 'Kanit'; font-size: 0.85rem; outline: none; width: 85px; color: #1e293b; position: relative; }
        input[type="time"]:not(:valid)::before { content: "hh:mm"; color: #cbd5e1; font-weight: 300; position: absolute; left: 0; }

        .dur-input { border: none; background: transparent; font-family: 'Kanit'; font-size: 0.9rem; color: var(--primary); width: 65px; text-align: center; outline: none; }
        .dur-input::placeholder { color: #cbd5e1; font-weight: 300; }

        .divider { margin: 0 6px; color: #cbd5e1; font-weight: 200; }

        /* Status & Buttons */
        .status-light { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .light-off { background-color: var(--red); box-shadow: 0 0 8px var(--red); }
        .light-on { background-color: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .btn-manual { width: 100%; padding: 12px; border-radius: 12px; border: none; font-family: 'Kanit'; font-size: 0.95rem; font-weight: 500; cursor: pointer; margin-top: 10px; }
        .btn-on { background: var(--secondary); color: white; }
        .btn-stop { background: var(--red); color: white; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; padding: 10px; box-shadow: 0 -4px 15px rgba(0,0,0,0.05); }
        .nav-item { flex: 1; border: none; background: none; color: #94a3b8; font-family: 'Kanit'; cursor: pointer; text-align: center; }
        .nav-item.active { color: var(--primary); font-weight: 600; }

        .switch { position: relative; width: 38px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; border-radius: 20px; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 2px; bottom: 2px; background-color: white; border-radius: 50%; transition: .4s; }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body>

<header>
    <h3><i class="fas fa-fish"></i> Smart Fish Farm</h3>
    <div style="font-size: 0.7rem; opacity: 0.8;"><i class="fas fa-circle" id="dot"></i> <span id="status-text">Connecting...</span></div>
</header>

<div class="container">
    <div id="tab-auto" class="tab-content active">
        <div class="sensor-grid">
            <div class="sensor-card">
                <i class="fas fa-thermometer-half" style="color:#0288d1"></i>
                <span class="val" id="temp-v">--</span>
                <small>Water T</small>
            </div>
            <div class="sensor-card">
                <i class="fas fa-vial" style="color:#7b1fa2"></i>
                <span class="val" id="ph-v">--</span>
                <small>pH</small>
            </div>
            <div class="sensor-card">
                <i class="fas fa-water" style="color:#00acc1"></i>
                <span class="val" id="lvl-v">--</span>
                <small>Level</small>
            </div>
            <div class="sensor-card">
                <i class="fas fa-bolt" style="color:#fbc02d"></i>
                <span class="val" id="tds-v">--</span>
                <small>TDS</small>
            </div>
        </div>

        <div class="panel">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px; color:var(--primary); font-weight:500; font-size:0.9rem;">
                <span><i class="fas fa-sync-alt"></i> ระบบกรองน้ำ (Filter)</span>
                <label class="switch"><input type="checkbox" id="sw-filter" onchange="saveConfig('filter')"><span class="slider"></span></label>
            </div>
            <div class="row">
                <span style="font-size:0.85rem;">☀️ ช่วงที่ 1</span>
                <div class="input-group">
                    <input type="time" id="f-t1" required onchange="saveConfig('filter')">
                    <span class="divider">|</span>
                    <input type="text" id="f-d1" class="dur-input" placeholder="mm:ss" inputmode="tel" oninput="formatTime(this)" onchange="saveConfig('filter')">
                </div>
            </div>
            <div class="row" style="border:none;">
                <span style="font-size:0.85rem;">🌙 ช่วงที่ 2</span>
                <div class="input-group">
                    <input type="time" id="f-t2" required onchange="saveConfig('filter')">
                    <span class="divider">|</span>
                    <input type="text" id="f-d2" class="dur-input" placeholder="mm:ss" inputmode="tel" oninput="formatTime(this)" onchange="saveConfig('filter')">
                </div>
            </div>
        </div>

        <div class="panel" style="border-left-color: var(--secondary);">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px; color:var(--secondary); font-weight:500; font-size:0.9rem;">
                <span><i class="fas fa-utensils"></i> เครื่องให้อาหาร (Feeder)</span>
                <label class="switch"><input type="checkbox" id="sw-feeder" onchange="saveConfig('feeder')"><span class="slider"></span></label>
            </div>
            <div class="row">
                <span style="font-size:0.85rem;">🥣 เช้า</span>
                <div class="input-group">
                    <input type="time" id="fd-t1" required onchange="saveConfig('feeder')">
                    <span class="divider">|</span>
                    <input type="text" id="fd-d1" class="dur-input" placeholder="mm:ss" inputmode="tel" oninput="formatTime(this)" onchange="saveConfig('feeder')">
                </div>
            </div>
            <div class="row" style="border:none;">
                <span style="font-size:0.85rem;">🥣 เย็น</span>
                <div class="input-group">
                    <input type="time" id="fd-t2" required onchange="saveConfig('feeder')">
                    <span class="divider">|</span>
                    <input type="text" id="fd-d2" class="dur-input" placeholder="mm:ss" inputmode="tel" oninput="formatTime(this)" onchange="saveConfig('feeder')">
                </div>
            </div>
        </div>
    </div>

    <div id="tab-manual" class="tab-content">
        <div class="panel">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <span style="font-weight:500; font-size:0.95rem;"><i class="fas fa-hand-holding-water"></i> บังคับกรองน้ำเอง</span>
                <div id="light-filter" class="status-light light-off"></div>
            </div>
            <button id="btn-filter" class="btn-manual btn-on" onclick="manualControl('filter')"><i class="fas fa-play"></i> เปิดระบบกรอง</button>
        </div>

        <div class="panel" style="border-left-color: var(--secondary);">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <span style="font-weight:500; font-size:0.95rem;"><i class="fas fa-cookie"></i> สั่งให้อาหารทันที</span>
                <div id="light-feeder" class="status-light light-off"></div>
            </div>
            <div class="row" style="border:none;">
                <span style="font-size:0.85rem;">ระยะเวลาหมุน</span>
                <div class="input-group">
                    <input type="text" id="man-dur-feeder" class="dur-input" placeholder="mm:ss" inputmode="tel" oninput="formatTime(this)" style="width:100px; font-size:1.1rem;">
                </div>
            </div>
            <button id="btn-feeder" class="btn-manual btn-on" onclick="manualControl('feeder')"><i class="fas fa-utensils"></i> ปล่อยอาหาร</button>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <button class="nav-item active" onclick="switchTab('tab-auto', this)"><i class="fas fa-clock"></i><br>Auto</button>
    <button class="nav-item" onclick="switchTab('tab-manual', this)"><i class="fas fa-hand-pointer"></i><br>Manual</button>
</nav>

<script>
    const firebaseConfig = { databaseURL: "https://smart-fish-farm-default-rtdb.firebaseio.com" }; // เปลี่ยนเป็น URL ของคุณ
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function formatTime(input) {
        let val = input.value.replace(/\D/g, '');
        if (val.length > 4) val = val.slice(0, 4);
        if (val.length >= 3) {
            input.value = val.slice(0, 2) + ':' + val.slice(2);
        } else {
            input.value = val;
        }
    }

    function secondsToMMSS(s) {
        if (!s) return "";
        return (Math.floor(s/60)).toString().padStart(2,'0') + ":" + (s%60).toString().padStart(2,'0');
    }

    function timeToSeconds(str) {
        if(!str || !str.includes(':')) return 0;
        const p = str.split(':');
        return (parseInt(p[0]) || 0) * 60 + (parseInt(p[1]) || 0);
    }

    function switchTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    db.ref().on("value", (snapshot) => {
        const data = snapshot.val();
        if(!data) return;

        if(data.sensor) {
            document.getElementById('temp-v').innerText = data.sensor.temp + "°";
            document.getElementById('ph-v').innerText = data.sensor.ph;
            document.getElementById('lvl-v').innerText = data.sensor.level + "%";
            document.getElementById('tds-v').innerText = data.sensor.tds;
            document.getElementById('dot').style.color = "#4caf50";
            document.getElementById('status-text').innerText = "Online";
        }

        if(data.control) {
            updateUI('filter', data.control.filter.run);
            updateUI('feeder', data.control.feeder.run);
        }

        if(data.auto) {
            const f = data.auto.filter;
            const fd = data.auto.feeder;
            if(f && document.activeElement.id !== 'f-t1') {
                document.getElementById('f-t1').value = f.time1;
                document.getElementById('f-d1').value = secondsToMMSS(f.dur1);
                document.getElementById('sw-filter').checked = f.enabled;
            }
            if(fd && document.activeElement.id !== 'fd-t1') {
                document.getElementById('fd-t1').value = fd.time1;
                document.getElementById('fd-d1').value = secondsToMMSS(fd.dur1);
                document.getElementById('sw-feeder').checked = fd.enabled;
            }
        }
    });

    function updateUI(id, run) {
        const btn = document.getElementById(`btn-${id}`);
        const light = document.getElementById(`light-${id}`);
        if(btn && light) {
            btn.innerHTML = run ? '<i class="fas fa-stop"></i> STOP' : (id === 'filter' ? 'เปิดระบบกรอง' : 'ปล่อยอาหาร');
            btn.className = run ? "btn-manual btn-stop" : "btn-manual btn-on";
            light.className = run ? "status-light light-on" : "status-light light-off";
        }
    }

    function manualControl(id) {
        const isRunning = document.getElementById(`btn-${id}`).classList.contains('btn-stop');
        if(isRunning) {
            db.ref(`control/${id}`).update({ run: false });
        } else {
            const dur = timeToSeconds(document.getElementById(`man-dur-${id}`)?.value || "01:00");
            db.ref(`control/${id}`).set({ run: true, duration: dur });
        }
    }

    function saveConfig(id) {
        const prefix = id === 'filter' ? 'f' : 'fd';
        db.ref(`auto/${id}`).set({
            enabled: document.getElementById(`sw-${id}`).checked,
            time1: document.getElementById(`${prefix}-t1`).value,
            dur1: timeToSeconds(document.getElementById(`${prefix}-d1`).value),
            time2: document.getElementById(`${prefix}-t2`).value,
            dur2: timeToSeconds(document.getElementById(`${prefix}-d2`).value)
        });
    }
</script>
</body>
</html>
